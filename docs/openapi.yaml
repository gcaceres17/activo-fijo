openapi: "3.1.0"
info:
  title: "Activo Fijo CLT API"
  version: "2.0.0"
  description: |
    API del Sistema de Gestión de Activos Fijos — CLT.
    Versión 2.0 post-reunión Banco Continental (12 mayo 2026).
    ⚠️ Este es un stub. El contrato completo se genera con el skill /sdd.

servers:
  - url: /api/v2

tags:
  - name: auth
  - name: activos
  - name: jornadas
  - name: incidencias
  - name: transferencias
  - name: dispositivos
  - name: configuracion
  - name: dashboard

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Login (propio o AD)
      
  /activos:
    get:
      tags: [activos]
      summary: Listar activos con filtros y paginación
    post:
      tags: [activos]
      summary: Crear activo (wizard completo)
      
  /activos/{id}/qr/imprimir:
    post:
      tags: [activos]
      summary: Enviar etiqueta QR a impresora Brother P950NW
      
  /activos/importar:
    post:
      tags: [activos]
      summary: Importar activos desde Excel/CSV

  /jornadas:
    get:
      tags: [jornadas]
      summary: Listar jornadas
    post:
      tags: [jornadas]
      summary: Crear jornada multi-sucursal
      
  /jornadas/{id}/items/{item_id}/registrar:
    patch:
      tags: [jornadas]
      summary: Registrar estado de activo en jornada (desde app mobile)

  /incidencias:
    get:
      tags: [incidencias]
    post:
      tags: [incidencias]
      summary: Registrar incidencia

  /transferencias:
    post:
      tags: [transferencias]
      summary: Solicitar transferencia
      
  /transferencias/{id}/aprobar:
    patch:
      tags: [transferencias]
      
  /dispositivos:
    get:
      tags: [dispositivos]
    post:
      tags: [dispositivos]
      summary: Registrar dispositivo (Brother P950NW o móvil)
      
  /dispositivos/{id}/test:
    post:
      tags: [dispositivos]
      summary: Test de conexión al dispositivo

  /configuracion/rubros/sync:
    post:
      tags: [configuracion]
      summary: Sincronizar rubros contables desde Finansys

  /dashboard/kpis:
    get:
      tags: [dashboard]
      summary: KPIs operativos del tenant
